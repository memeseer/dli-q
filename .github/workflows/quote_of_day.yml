name: Quote of Day

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: quote-of-day
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests loguru python-dotenv

      - name: Run bot (generate quote + append archive)
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # REQUIRED
          QUOTE_SOURCE_CHANNELS: "1471673873362718841"
          QUOTE_POST_CHANNEL_ID: "1471673873362718841"
          GUILD_ID: "1460130124598087712"

          # SETTINGS
          QUOTE_LOOKBACK_HOURS: "24"
          QUOTE_LANG: "ru"
          QUOTE_DRY_RUN: "0"

          # Output
          QUOTE_SELECTED_ONLY_ARCHIVE_PATH: "quotes_selected_only.json"
          QUOTE_RUN_OUT_JSON_PATH: "quote_run.json"

          # Optional safety cap
          QUOTE_HARD_MAX_MESSAGES_PER_CHANNEL: "40000"
        run: |
          python quote_of_day.py

      - name: Commit & push updated archive
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # добавляем только нужные файлы (можешь убрать quote_run.json, если не хочешь)
          git add quotes_selected_only.json

          # если нечего коммитить — просто выходим
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: append quote to archive"
          git push
